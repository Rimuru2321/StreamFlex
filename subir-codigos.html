<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>StreamFlex — Subir Códigos Premium</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Arial, sans-serif; background: #0a0a0a; color: #eee; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1rem; }
  .wrap { background: #161616; border: 1px solid #333; border-radius: 12px; padding: 2rem; width: 100%; max-width: 560px; }
  h1 { color: #c9a84c; font-size: 1.3rem; margin-bottom: 0.3rem; }
  .sub { color: #666; font-size: 0.82rem; margin-bottom: 1.5rem; }
  button { width: 100%; background: #c9a84c; color: #1a1a00; border: none; padding: 0.85rem; border-radius: 8px; font-weight: 700; font-size: 1rem; cursor: pointer; margin-top: 1rem; }
  button:hover { opacity: 0.85; }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
  .log { background: #111; border: 1px solid #222; border-radius: 8px; padding: 1rem; margin-top: 1rem; font-family: monospace; font-size: 0.78rem; line-height: 1.7; max-height: 320px; overflow-y: auto; display: none; }
  .ok  { color: #00cc66; }
  .err { color: #ff4444; }
  .inf { color: #aaa; }
  .done-banner { background: #0a2a10; border: 1px solid #00cc6644; border-radius: 8px; padding: 1rem; margin-top: 1rem; color: #00cc66; font-weight: 700; text-align: center; display: none; }
</style>
</head>
<body>
<div class="wrap">
  <h1>⭐ Subir Códigos Premium a Supabase</h1>
  <p class="sub">Pega los códigos generados abajo y pulsa subir</p>

  <textarea id="codesInput" placeholder="Pega aquí los códigos generados (uno por línea)..." style="width:100%;height:120px;background:#222;border:1px solid #333;border-radius:6px;color:#eee;padding:0.6rem 0.8rem;font-size:0.9rem;margin-bottom:1rem;outline:none;"></textarea>

  <button id="btn" onclick="uploadCodes()">🚀 Subir códigos a Supabase</button>

  <div class="log" id="log"></div>
  <div class="done-banner" id="doneBanner">✅ ¡Listo! Los códigos están en Supabase listos para usar.</div>
</div>

<!-- Supabase -->
<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

const SUPABASE_URL = "https://exahvybdsbrwgavycnhk.supabase.co";
const SUPABASE_KEY = "sb_publishable_zWLgFAuxmQtK4M-et792hA_gwYJnC7P";
const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

window.uploadCodes = async function() {
  const btn  = document.getElementById('btn');
  const log  = document.getElementById('log');
  const done = document.getElementById('doneBanner');
  const codesText = document.getElementById('codesInput').value.trim();
  if (!codesText) {
    alert('Pega los códigos primero');
    return;
  }
  const CODES = codesText.split('\n').map(c => c.trim()).filter(c => c);
  if (CODES.length === 0) {
    alert('No se encontraron códigos válidos');
    return;
  }
  btn.disabled = true;
  log.style.display = 'block';
  log.innerHTML = '<span class="inf">Iniciando subida de ' + CODES.length + ' codigos...</span><br>';

  let ok = 0, fail = 0;
  for (const code of CODES) {
    try {
      await sb.from('codes').insert({
        code: code,
        used: false,
        created_at: new Date().toISOString(),
        note: 'Batch — ' + new Date().toLocaleDateString('es-ES')
      });
      ok++;
      log.innerHTML += '<span class="ok">✓ ' + code + '</span><br>';
    } catch(e) {
      fail++;
      log.innerHTML += '<span class="err">✗ ' + code + ' — ' + e.message + '</span><br>';
    }
    log.scrollTop = log.scrollHeight;
    await new Promise(r => setTimeout(r, 80));
  }

  log.innerHTML += '<br><span class="inf">──────────────────────────────</span><br>';
  log.innerHTML += '<span class="ok">Subidos: ' + ok + '</span>   <span class="err">Errores: ' + fail + '</span><br>';
  log.scrollTop = log.scrollHeight;
  if (ok > 0) done.style.display = 'block';
  btn.textContent = 'Completado';
};
</script>
</body>
</html>
